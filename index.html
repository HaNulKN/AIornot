<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>AI와 AI가 아닌 것으로 나눠봅시다</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nanum+Round+Square:wght@400;700;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nanum Round Square', 'Malgun Gothic', sans-serif;
    background: #FFF8F0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 36px 60px 40px;
    user-select: none;
  }

  h1 {
    font-size: 3.2rem;
    font-weight: 800;
    color: #2EAA6E;
    text-align: center;
    margin-bottom: 10px;
    letter-spacing: -1px;
  }
  .subtitle {
    font-size: 1.5rem;
    color: #555;
    text-align: center;
    margin-bottom: 32px;
  }
  .subtitle span { color: #F5A623; font-weight: 800; }

  /* 드롭존 */
  .zones {
    display: flex;
    gap: 40px;
    width: 100%;
    max-width: 1400px;
    margin-bottom: 32px;
  }
  .zone {
    flex: 1;
    border-radius: 28px;
    border: 5px solid #F5A623;
    background: #fff;
    padding: 24px 20px 28px;
    min-height: 320px;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: background 0.2s;
  }
  .zone.drag-over { background: #FFF3DC; border-color: #e0941a; }

  .zone-title {
    background: #F5A623;
    color: #fff;
    font-size: 2rem;
    font-weight: 800;
    border-radius: 14px;
    padding: 12px 28px;
    margin-bottom: 20px;
    text-align: center;
    width: 100%;
    position: relative;
  }
  .cross {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 4.5rem;
    color: rgba(0,0,0,0.8);
    font-weight: 900;
    pointer-events: none;
    line-height: 1;
  }

  .zone-items {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    justify-content: center;
    align-items: center;
    min-height: 200px;
    width: 100%;
  }

  /* 카드 풀 (박스 바깥) */
  .pool-area {
    width: 100%;
    max-width: 1400px;
    background: #fff;
    border-radius: 24px;
    border: 3px dashed #F5A623;
    padding: 24px 28px;
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
    align-items: center;
    min-height: 160px;
    margin-bottom: 24px;
  }
  .pool-label {
    width: 100%;
    text-align: center;
    font-size: 1.2rem;
    font-weight: 800;
    color: #F5A623;
    margin-bottom: 4px;
  }

  /* 카드 */
  .card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.10);
    padding: 14px 16px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: grab;
    transition: transform 0.15s, box-shadow 0.15s;
    border: 3px solid transparent;
    min-width: 120px;
  }
  .card:hover { transform: scale(1.08); box-shadow: 0 8px 24px rgba(0,0,0,0.16); }
  .card.dragging { opacity: 0.35; cursor: grabbing; }
  .card img { width: 110px; height: 110px; object-fit: contain; }
  .card .label { font-size: 1.15rem; font-weight: 800; color: #3a3a3a; text-align: center; }

  /* 피드백 & 버튼 */
  .feedback {
    font-size: 1.8rem;
    font-weight: 800;
    text-align: center;
    min-height: 52px;
    margin-bottom: 12px;
    color: #2EAA6E;
  }
  .btn-reset {
    font-family: 'Nanum Round Square', sans-serif;
    font-size: 1.4rem;
    font-weight: 800;
    background: #F5A623;
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 16px 48px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(245,166,35,0.3);
    transition: transform .15s;
  }
  .btn-reset:hover { transform: scale(1.05); }

  /* 튕기기 애니메이션 */
  @keyframes bounce-back {
    0%   { transform: scale(1.15); }
    30%  { transform: translateX(-12px) rotate(-5deg); }
    60%  { transform: translateX(10px) rotate(4deg); }
    80%  { transform: translateX(-6px) rotate(-2deg); }
    100% { transform: translateX(0) rotate(0deg) scale(1); }
  }
  @keyframes correct-pop {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.22); }
    70%  { transform: scale(0.93); }
    100% { transform: scale(1); }
  }
  .bounce-back { animation: bounce-back 0.55s ease; }
  .correct-pop { animation: correct-pop 0.4s ease; }

  /* 폭죽 */
  .confetti-wrap { position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999; }
  .confetti-piece { position:absolute;border-radius:3px;animation:fall linear forwards; }
  @keyframes fall {
    0%   { transform:translateY(-20px) rotate(0deg); opacity:1; }
    100% { transform:translateY(110vh) rotate(720deg); opacity:0; }
  }
</style>
</head>
<body>

<div class="confetti-wrap" id="confetti-wrap"></div>
<h1>AI와 AI가 아닌 것으로 나눠봅시다.</h1>
<p class="subtitle"><span>★ 기준:</span> 스스로 생각하나요? 사람들을 도와주나요?</p>

<!-- 드롭존 2개 -->
<div class="zones">
  <div class="zone" id="zone-ai" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'ai')">
    <div class="zone-title">에이아이(AI)</div>
    <div class="zone-items" id="items-ai"></div>
  </div>
  <div class="zone" id="zone-not" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'not')">
    <div class="zone-title">에이아이(AI) <span class="cross">✕</span></div>
    <div class="zone-items" id="items-not"></div>
  </div>
</div>

<!-- 카드 풀 -->
<div class="pool-area" id="pool" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'pool')">
  <div class="pool-label">👇 여기서 골라서 위 칸에 넣어보세요!</div>
</div>

<div class="feedback" id="feedback"></div>
<button class="btn-reset" onclick="resetAll()">🔄 다시 해볼게요!</button>

  { id:'cat',    label:'고양이',    answer:'not' },
  { id:'plant',  label:'화분',      answer:'not' },
  { id:'clock',  label:'시계',      answer:'not' },
];

let dragId = null;

function shuffle(arr) {
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

function makeCard(item) {
  const card = document.createElement('div');
  card.className = 'card';
  card.id = 'card-' + item.id;
  card.draggable = true;
  card.dataset.id = item.id;

  const img = document.createElement('img');
  img.src = IMGS[item.id];
  img.alt = item.label;
  card.appendChild(img);

  const lbl = document.createElement('div');
  lbl.className = 'label';
  lbl.textContent = item.label;
  card.appendChild(lbl);

  // 마우스 드래그
  card.addEventListener('dragstart', () => {
    dragId = item.id;
    setTimeout(() => card.classList.add('dragging'), 0);
  });
  card.addEventListener('dragend', () => {
    card.classList.remove('dragging');
    dragId = null;
  });

  // 터치 지원
  let clone = null;
  card.addEventListener('touchstart', (e) => {
    dragId = item.id;
    const t = e.touches[0];
    clone = card.cloneNode(true);
    clone.style.cssText = 'position:fixed;opacity:0.75;pointer-events:none;z-index:9999;transform:scale(1.12);transition:none;';
    clone.style.left = (t.clientX - 65) + 'px';
    clone.style.top  = (t.clientY - 75) + 'px';
    document.body.appendChild(clone);
    card.style.opacity = '0.3';
  }, {passive:true});

  card.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const t = e.touches[0];
    if(clone) { clone.style.left=(t.clientX-65)+'px'; clone.style.top=(t.clientY-75)+'px'; }
    document.querySelectorAll('.zone, .pool-area').forEach(z => z.classList.remove('drag-over'));
    const el = document.elementFromPoint(t.clientX, t.clientY);
    const z = el && (el.closest('.zone') || el.closest('.pool-area'));
    if(z) z.classList.add('drag-over');
  }, {passive:false});

  card.addEventListener('touchend', (e) => {
    if(clone) { document.body.removeChild(clone); clone=null; }
    card.style.opacity = '';
    document.querySelectorAll('.zone, .pool-area').forEach(z => z.classList.remove('drag-over'));
    const t = e.changedTouches[0];
    const el = document.elementFromPoint(t.clientX, t.clientY);
    const zone = el && el.closest('.zone');
    const pool = el && el.closest('.pool-area');
    if(zone) {
      const zId = zone.id === 'zone-ai' ? 'ai' : 'not';
      dropCard(dragId, zId);
    } else if(pool) {
      dropCard(dragId, 'pool');
    }
    dragId = null;
  });

  return card;
}

function onDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function onDrop(e, zoneId) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(dragId) dropCard(dragId, zoneId);
}

// ── Web Audio 효과음 ──
const AC = new (window.AudioContext || window.webkitAudioContext)();

function playWrong() {
  // 낮고 짧은 버저음
  const o = AC.createOscillator();
  const g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(220, AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(110, AC.currentTime + 0.3);
  g.gain.setValueAtTime(0.4, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.35);
  o.start(); o.stop(AC.currentTime + 0.35);
}

function playCorrect() {
  // 맑은 팅 소리
  [0, 0.12].forEach((delay, i) => {
    const o = AC.createOscillator();
    const g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(i === 0 ? 523 : 784, AC.currentTime + delay);
    g.gain.setValueAtTime(0.35, AC.currentTime + delay);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + delay + 0.4);
    o.start(AC.currentTime + delay);
    o.stop(AC.currentTime + delay + 0.4);
  });
}

function playFanfare() {
  // 빵빠레 — 화음 시퀀스
  const notes = [
    [523, 0],    // C5
    [659, 0.12], // E5
    [784, 0.24], // G5
    [1047,0.36], // C6
    [784, 0.5],  // G5
    [1047,0.62], // C6
  ];
  notes.forEach(([freq, delay]) => {
    const o = AC.createOscillator();
    const g = AC.createGain();
    const dist = AC.createWaveShaper();
    // 약간 풍성하게
    const curve = new Float32Array(256);
    for(let i=0;i<256;i++) curve[i] = (i<128 ? i/128 : (i-256)/128) * 0.5;
    dist.curve = curve;
    o.connect(dist); dist.connect(g); g.connect(AC.destination);
    o.type = 'triangle';
    o.frequency.setValueAtTime(freq, AC.currentTime + delay);
    g.gain.setValueAtTime(0, AC.currentTime + delay);
    g.gain.linearRampToValueAtTime(0.45, AC.currentTime + delay + 0.05);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + delay + 0.5);
    o.start(AC.currentTime + delay);
    o.stop(AC.currentTime + delay + 0.55);
  });
}

function launchConfetti() {
  const wrap = document.getElementById('confetti-wrap');
  wrap.innerHTML = '';
  const colors = ['#FFD93D','#FF6B6B','#6EC6F5','#6BCB77','#C77DFF','#FF9A4D','#F5A623'];
  for(let i=0;i<100;i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random()*100 + 'vw';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.width  = (8+Math.random()*10)+'px';
    p.style.height = (8+Math.random()*10)+'px';
    p.style.animationDuration = (1.5+Math.random()*2)+'s';
    p.style.animationDelay   = (Math.random()*1)+'s';
    wrap.appendChild(p);
    p.addEventListener('animationend', ()=>p.remove());
  }
}

// ── 드롭 & 판정 ──
function dropCard(id, zoneId) {
  // AudioContext resume (터치 첫 이벤트)
  if(AC.state === 'suspended') AC.resume();

  const card = document.getElementById('card-' + id);
  if(!card) return;
  card.style.border = '3px solid transparent';
  card.classList.remove('bounce-back','correct-pop');
  document.getElementById('feedback').textContent = '';

  if(zoneId === 'ai') document.getElementById('items-ai').appendChild(card);
  else if(zoneId === 'not') document.getElementById('items-not').appendChild(card);
  else { document.getElementById('pool').appendChild(card); return; }

  // 즉시 정오 판정
  const item = items.find(i => i.id === id);
  const inZone = zoneId;
  void card.offsetWidth; // reflow
  if(inZone === item.answer) {
    card.style.border = '3px solid #2EAA6E';
    card.classList.add('correct-pop');
    playCorrect();
    card.addEventListener('animationend', () => card.classList.remove('correct-pop'), {once:true});
  } else {
    card.style.border = '3px solid #FF4444';
    card.classList.add('bounce-back');
    playWrong();
    // 0.55초 후 풀로 튕겨냄
    setTimeout(() => {
      card.classList.remove('bounce-back');
      card.style.border = '3px solid transparent';
      document.getElementById('pool').appendChild(card);
    }, 560);
    return; // 틀리면 checkAll 안 함
  }

  checkAll();
}

function checkAll() {
  const placed = items.filter(i => {
    const p = document.getElementById('card-'+i.id).parentElement;
    return p.id === 'items-ai' || p.id === 'items-not';
  });
  if(placed.length !== items.length) return;

  // 여기까지 오면 모두 맞음 (틀리면 튕겨나가서 placed < total)
  const fb = document.getElementById('feedback');
  fb.textContent = '🎉 모두 맞았어요! 정말 잘했어요!';
  fb.style.color = '#2EAA6E';
  playFanfare();
  launchConfetti();
}

function resetAll() {
  ['items-ai','items-not'].forEach(id => document.getElementById(id).innerHTML='');
  document.getElementById('feedback').textContent = '';
  const pool = document.getElementById('pool');
  // pool-label 빼고 카드 제거
  Array.from(pool.children).forEach(c => { if(!c.classList.contains('pool-label')) pool.removeChild(c); });

  shuffle(items).forEach(item => {
    const card = document.getElementById('card-'+item.id) || makeCard(item);
    card.style.border = '3px solid transparent';
    pool.appendChild(card);
  });
}

resetAll();
</script>
